    <style>
        :root {
            --bg: #07080b;
            --bg-2: #0c0e13;
            --bg-3: #11141b;
            --line: rgba(255, 255, 255, 0.07);
            --line-2: rgba(255, 255, 255, 0.12);
            --fg: #f4f1ea;
            --fg-dim: rgba(244, 241, 234, 0.62);
            --fg-faint: rgba(244, 241, 234, 0.36);
            --accent: #3b82f6;
            --accent-2: #7fb8ff;
            --accent-deep: #1d4ed8;
            --accent-soft: #bcdcff;
            --on-accent: #ffffff;
            --clinical: #7fb8ff;
            --mint: #6fe0c0;
            --serif: "Fraunces", ui-serif, Georgia, serif;
            --sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
            --mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
            --radius: 14px;
        }

        * { box-sizing: border-box }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: var(--sans);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            overflow-x: hidden;
            background:
                radial-gradient(circle at 50% -10%, rgba(59, 130, 246, 0.12), transparent 42%),
                var(--bg);
        }

        a { color: inherit; text-decoration: none }
        button { font-family: inherit }

        [id] { scroll-margin-top: 90px; }

        /* Decorative grid + glow shared layer */
        .grid-bg {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
        }

        .ember {
            position: absolute; pointer-events: none; border-radius: 50%;
            background: radial-gradient(closest-side, color-mix(in oklab, var(--accent) 70%, transparent), transparent 70%);
            filter: blur(40px);
        }

        /* Liquid glass utility */
        .lg {
            position: relative; overflow: hidden;
            background: rgba(255, 255, 255, 0.018);
            backdrop-filter: blur(8px) saturate(140%);
            -webkit-backdrop-filter: blur(8px) saturate(140%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 1px 0 rgba(0, 0, 0, 0.4);
        }

        .lg::before {
            content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04) 35%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, 0.10));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none;
        }

        /* CTAs */
        .btn {
            display: inline-flex; align-items: center; gap: 10px; height: 48px; padding: 0 22px;
            border-radius: 999px; border: 1px solid transparent; font-weight: 600; font-size: 15px;
            letter-spacing: -0.01em; cursor: pointer;
            transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
        }

        .btn-primary {
            color: var(--on-accent); background: linear-gradient(180deg, var(--accent-soft), var(--accent) 55%, var(--accent-deep));
            box-shadow: 0 0 0 1px rgba(96, 165, 250, .55), 0 10px 30px -8px color-mix(in oklab, var(--accent) 60%, transparent), inset 0 1px 0 rgba(255, 255, 255, .35);
        }

        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.03); }
        .btn-ghost { color: var(--fg); background: rgba(255, 255, 255, 0.04); border: 1px solid var(--line-2); }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.07); }

        /* Eyebrow pill */
        .eyebrow {
            display: inline-flex; align-items: center; gap: 8px; height: 30px; padding: 0 14px;
            border-radius: 999px; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--accent-2); background: color-mix(in oklab, var(--accent) 10%, transparent);
            border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
        }

        .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }

        /* Section helpers */
        .section { position: relative; padding: 120px 32px; }
        .container { max-width: 1240px; margin: 0 auto; position: relative; z-index: 1 }
        .kicker { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-faint) }

        /* Headline shared */
        .display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.025em; line-height: 0.96; }
        .display em {
            font-style: italic; font-weight: 400;
            padding-right: 0.14em; margin-right: -0.14em;
            background: linear-gradient(105deg, var(--accent-2) 5%, var(--accent) 45%, var(--accent-soft) 95%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        /* Marquee */
        @keyframes marq { from { transform: translateX(0) } to { transform: translateX(-50%) } }
        .marq { display: flex; gap: 64px; width: max-content; animation: marq 32s linear infinite; }

        /* Voice waveform */
        @keyframes wave {
            0%, 100% { transform: scaleY(0.35); }
            50% { transform: scaleY(1); }
        }
        .bar { display: inline-block; width: 3px; border-radius: 3px; background: var(--accent); animation: wave 1.2s ease-in-out infinite; }

        /* dial pulse */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
            70% { box-shadow: 0 0 0 26px color-mix(in oklab, var(--accent) 0%, transparent); }
            100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 0%, transparent); }
        }

        /* fade-up entrance */
        @keyframes rise { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: none } }
        .rise { animation: rise .9s cubic-bezier(.2, .7, .2, 1) both; }

        /* Numeric tile */
        .num { font-family: var(--serif); font-weight: 500; font-size: 84px; letter-spacing: -0.03em; line-height: 0.95; }

        /* Section divider */
        .hr-faint { height: 1px; background: linear-gradient(90deg, transparent, var(--line-2), transparent); border: 0; }

        /* Pricing card highlight ring */
        .ring-accent { box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent) 50%, transparent), 0 30px 80px -20px color-mix(in oklab, var(--accent) 25%, transparent); }

        /* Form */
        .input, .select {
            width: 100%; height: 48px; padding: 0 14px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--line-2);
            border-radius: 12px; color: var(--fg); font: 500 14px/1 var(--sans); outline: none;
        }
        .input::placeholder { color: var(--fg-faint) }
        .input:focus, .select:focus { border-color: color-mix(in oklab, var(--accent) 50%, var(--line-2)); }
        .select option { background: var(--bg-3); color: var(--fg); }
        .label { font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 8px; display: block; }

        /* Chips */
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            display: inline-flex; align-items: center; gap: 8px; height: 34px; padding: 0 14px; border-radius: 999px;
            border: 1px solid var(--line-2); background: rgba(255, 255, 255, 0.02); color: var(--fg-dim); font-size: 13px;
        }
        .chip.on { color: var(--fg); background: color-mix(in oklab, var(--accent) 12%, rgba(255, 255, 255, 0.02)); border-color: color-mix(in oklab, var(--accent) 40%, var(--line-2)); }

        /* Transcript bubbles */
        .bubble { padding: 12px 16px; border-radius: 14px; max-width: 80%; font-size: 14.5px; line-height: 1.5; }
        .bubble.caller { background: rgba(127, 184, 255, 0.08); border: 1px solid rgba(127, 184, 255, 0.18); color: #dfeaff; align-self: flex-start; border-bottom-left-radius: 6px; }
        .bubble.nova { background: linear-gradient(180deg, rgba(59, 130, 246, 0.20), rgba(59, 130, 246, 0.08)); border: 1px solid color-mix(in oklab, var(--accent) 35%, var(--line-2)); align-self: flex-end; border-bottom-right-radius: 6px; }

        /* Small caps label inside features */
        .cap { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent-2); }

        /* Tooth seal SVG container */
        .seal { width: 64px; height: 64px; border-radius: 16px; display: grid; place-items: center; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--line-2); }

        /* Responsive grid helpers (el prototipo era solo-desktop con grids inline) */
        .grid-hero { display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
        .grid-demo { display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; }
        .grid-2-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        @media (max-width: 900px) {
            .section { padding: 80px 20px; }
            .num { font-size: 60px }
            .nav-links { display: none !important; }
            .grid-hero, .grid-3, .grid-4, .grid-demo, .grid-2-cards { grid-template-columns: 1fr; }
            .metric-cell { border-right: none !important; border-bottom: 1px solid var(--line); }
            .metric-cell:last-child { border-bottom: none; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #2a2622; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
